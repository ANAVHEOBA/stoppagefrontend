<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(502 505) rotate(88) scale(570)">
      <stop offset="0" stop-color="#3263FF"/>
      <stop offset="0.55" stop-color="#1F52FF"/>
      <stop offset="1" stop-color="#1144F5"/>
    </radialGradient>
    <linearGradient id="bgShade" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1D55FF"/>
      <stop offset="0.52" stop-color="#285CFF"/>
